<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Text Luxury</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}

body{
height:100vh;
background:radial-gradient(circle at top,#2b0066,#0b0015 70%);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

h1{
margin-bottom:25px;
font-weight:300;
letter-spacing:4px;
color:#d1c4ff;
font-size:28px;
}

.card{
width:90%;
max-width:900px;
height:60vh;
background:#070012;
border-radius:35px;
position:relative;
overflow:hidden;
box-shadow:
0 0 120px rgba(140,0,255,0.25),
inset 0 0 80px rgba(120,0,255,0.1);
}

canvas{
position:absolute;
width:100%;
height:100%;
}

.bar{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:85%;
display:flex;
gap:10px;
background:rgba(20,10,40,0.6);
border:1px solid rgba(160,120,255,0.3);
border-radius:60px;
padding:10px 15px 10px 25px;
backdrop-filter:blur(30px);
}

.bar input{
flex:1;
background:none;
border:none;
outline:none;
color:#e9e4ff;
font-size:18px;
letter-spacing:1px;
}

.bar button{
border:none;
background:#a855f7;
color:white;
padding:10px 30px;
border-radius:50px;
cursor:pointer;
font-weight:500;
box-shadow:0 0 20px rgba(168,85,247,0.5);
}
</style>
</head>
<body>

<h1>Particle Text Effect</h1>

<div class="card">
<canvas id="canvas"></canvas>

<div class="bar">
<input type="text" id="textInput" placeholder="Nhập chữ của bạn...">
<button onclick="generate()">Generate</button>
</div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const input=document.getElementById("textInput");

function resize(){
canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

class Particle{
constructor(x,y){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.tx=x;
this.ty=y;
this.size=1.2;
}
update(){
this.x+=(this.tx-this.x)*0.06;
this.y+=(this.ty-this.y)*0.06;
}
draw(){
ctx.fillStyle="#b794f4";
ctx.shadowColor="#b794f4";
ctx.shadowBlur=10;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}
}

function generate(){
let text=input.value.trim();
particles=[];
ctx.clearRect(0,0,canvas.width,canvas.height);

if(text==="") return;

ctx.font=`700 ${canvas.width/7}px "SF Pro Display", Arial, sans-serif`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillStyle="white";
ctx.fillText(text,canvas.width/2,canvas.height/2);

let data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

for(let y=0;y<canvas.height;y+=5){
for(let x=0;x<canvas.width;x+=5){
let index=(y*canvas.width+x)*4;
if(data[index+3]>180){
particles.push(new Particle(x,y));
}
}
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.update();
p.draw();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
