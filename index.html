<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Liquid Text</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#2a004f,#0b0015);
overflow:hidden;
}

.wrapper{
width:95%;
max-width:900px;
text-align:center;
}

.canvasBox{
position:relative;
height:60vh;
border-radius:30px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

h1{
font-weight:900;
font-size:clamp(50px,10vw,120px);
background:linear-gradient(90deg,#c084fc,#a855f7,#7e22ce,#c084fc);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s ease infinite;
text-align:center;
filter:drop-shadow(0 0 25px rgba(168,85,247,0.6));
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px 20px;
border-radius:50px;
border:none;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
padding:15px 25px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:600;
background:linear-gradient(45deg,#a855f7,#7e22ce);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="wrapper">

<div class="canvasBox">
<h1 id="mainText">Nguyễn Minh Khôi</h1>
</div>

<div class="controls">
<input id="textInput" placeholder="Nhập text dev của bạn...">
<button onclick="changeText()">Generate</button>
</div>

</div>

<script>
function changeText(){
let value=document.getElementById("textInput").value;
if(value.trim()!==""){
document.getElementById("mainText").innerText=value;
}
}
</script>

</body>
</html>
