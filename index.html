<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Dev Text</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle at top,#240046,#0d001a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.container{
  width:95%;
  max-width:900px;
  text-align:center;
}

canvas{
  width:100%;
  height:55vh;
  border-radius:25px;
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(20px);
}

.inputBox{
  margin-top:20px;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:14px 18px;
  border-radius:50px;
  border:none;
  outline:none;
  font-size:16px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  padding:14px 24px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(45deg,#9d4edd,#7b2cbf);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <canvas id="canvas"></canvas>

  <div class="inputBox">
    <input type="text" id="textInput" placeholder="Nhập chữ dev của bạn...">
    <button onclick="generateText()">Generate</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];
let text = "Nguyễn Minh Khôi";

function resizeCanvas(){
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

class Particle{
  constructor(x,y){
    this.baseX = x;
    this.baseY = y;
    this.x = x;
    this.y = y;
    this.size = 1.5 + Math.random()*1.5;
    this.angle = Math.random()*Math.PI*2;
  }

  update(){
    this.angle += 0.03;
    this.x = this.baseX + Math.cos(this.angle)*2;
    this.y = this.baseY + Math.sin(this.angle)*2;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = "rgba(200,160,255,0.9)";
    ctx.fill();
  }
}

function generateText(){
  text = document.getElementById("textInput").value || text;
  createParticles();
}

function createParticles(){
  particles = [];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let maxWidth = canvas.width*0.8;
  let fontSize = canvas.width/(text.length*0.6);
  if(fontSize>140) fontSize=140;
  if(fontSize<40) fontSize=40;

  ctx.font = `900 ${fontSize}px Inter`;
  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.fillText(text,canvas.width/2,canvas.height/2);

  const textData = ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<canvas.height;y+=4){
    for(let x=0;x<canvas.width;x+=4){
      const index = (y*canvas.width + x)*4;
      if(textData.data[index+3] > 128){
        particles.push(new Particle(x,y));
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#b5179e";

  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

createParticles();
animate();
</script>

</body>
</html>
