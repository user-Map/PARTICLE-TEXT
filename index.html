<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Sphere Optimized</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#07040f;
font-family:Arial,Helvetica,sans-serif;
}

canvas{
position:fixed;
inset:0;
z-index:1;
}

#input-area{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
z-index:10;
display:flex;
gap:10px;
}

#prompt{
padding:12px 20px;
border-radius:30px;
border:1px solid #7c3aed;
background:#140a25;
color:white;
outline:none;
width:220px;
}

#gen-btn{
padding:12px 20px;
border:none;
border-radius:30px;
background:#7c3aed;
color:white;
cursor:pointer;
}

#reset-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#140a25;
color:#c084fc;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="input-area">
<input type="text" id="prompt" placeholder="Enter text...">
<button id="gen-btn">Generate</button>
</div>

<button id="reset-btn">Reset</button>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let W,H,DPR=Math.min(window.devicePixelRatio,1.5);

function resize(){
W=window.innerWidth;
H=window.innerHeight;
canvas.width=W*DPR;
canvas.height=H*DPR;
canvas.style.width=W+"px";
canvas.style.height=H+"px";
ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize",resize);
resize();

/* ==== AUTO OPTIMIZE PARTICLES ==== */
const isMobile=window.innerWidth<768;
const NUM=isMobile?700:1100;

function makeSphere(n){
const arr=[];
for(let i=0;i<n;i++){
const phi=Math.acos(1-2*(i+.5)/n);
const th=Math.PI*(1+Math.sqrt(5))*i;
arr.push([
Math.sin(phi)*Math.cos(th),
Math.sin(phi)*Math.sin(th),
Math.cos(phi)
]);
}
return arr;
}

const spherePts=makeSphere(NUM);
const P=[];
const Rbase=()=>Math.min(W,H)*0.23;

for(let i=0;i<NUM;i++){
const [hx,hy,hz]=spherePts[i];
const R=Rbase();
P.push({
hx,hy,hz,
x:W/2+hx*R,
y:H/2+hy*R,
phase:Math.random()*Math.PI*2,
spd:0.5+Math.random()*0.5,
sz:0.8+Math.random()*1.2
});
}

let ry=0,rx=.15;
let mRY=0,mRX=0,cRY=0,cRX=0;
let last=0;

/* ==== Mouse ==== */
document.addEventListener("mousemove",e=>{
mRY=(e.clientX/W-.5)*.4;
mRX=(e.clientY/H-.5)*-.2;
});

/* ==== Projection ==== */
function proj(nx,ny,nz){
const cy=Math.cos(ry),sy=Math.sin(ry);
let x=nx*cy+nz*sy;
let z=-nx*sy+nz*cy;

const cx=Math.cos(rx),sx=Math.sin(rx);
const y2=ny*cx-z*sx;
const z2=ny*sx+z*cx;

const f=2/(2+z2);
const R=Rbase();

return{
sx:W/2+x*R*f,
sy:H/2+y2*R*f,
sc:f
};
}

/* ==== Draw (60FPS limit) ==== */
function draw(ts){
if(ts-last<16){
requestAnimationFrame(draw);
return;
}
last=ts;

requestAnimationFrame(draw);
ctx.clearRect(0,0,W,H);

cRY+=(mRY-cRY)*.05;
cRX+=(mRX-cRX)*.05;

ry+=0.002+cRY*.02;
rx=.15+cRX;

for(const p of P){
const wave=Math.sin(p.phase+ts*.001*p.spd)*.01;
const pr=proj(p.hx*(1+wave),p.hy*(1+wave),p.hz);

ctx.globalAlpha=0.6*pr.sc;
ctx.fillStyle="#a855f7";
ctx.beginPath();
ctx.arc(pr.sx,pr.sy,p.sz,0,Math.PI*2);
ctx.fill();
}
}

requestAnimationFrame(draw);

/* ==== Reset ==== */
document.getElementById("reset-btn").onclick=()=>{
const R=Rbase();
for(const p of P){
p.x=W/2+p.hx*R;
p.y=H/2+p.hy*R;
}
};
</script>

</body>
</html>
